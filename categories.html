<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTER</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.title {
  margin-bottom: 40px;
  opacity: 0.6;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 80%;
}

.card {
  padding: 30px;
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  border-color: white;
}

.surprise {
  margin-top: 40px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="title">What are you looking for?</div>

<div class="grid">
  <div class="card">T-Shirts</div>
  <div class="card">Hoodies</div>
  <div class="card">Tracksuits</div>
  <div class="card">Handbags</div>
</div>

<div class="surprise">Let ALTER decide</div>

</body>
</html>
