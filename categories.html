<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTER</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  padding: 20px;
}

.title {
  font-size: 28px;
  letter-spacing: 4px;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.card {
  background: #111;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 12px;
}

.name {
  font-size: 14px;
  opacity: 0.8;
}

.price {
  font-size: 16px;
  margin-top: 4px;
}

.buy {
  margin-top: 10px;
  padding: 10px;
  text-align: center;
  background: white;
  color: black;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <div class="title" id="title">Loading...</div>
  <div class="grid" id="grid"></div>
</div>

<script src="products.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

const grid = document.getElementById("grid");
const title = document.getElementById("title");

title.innerText = type.toUpperCase();

const items = PRODUCTS[type];

setTimeout(() => {
  speak("Showing " + type);
}, 500);

items.forEach(product => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${product.image}">
    <div class="card-content">
      <div class="name">${product.name}</div>
      <div class="price">${product.price}</div>
      <div class="buy" onclick="buy('${product.name}')">Buy</div>
    </div>
  `;

  grid.appendChild(card);
});

function buy(name) {
  alert("Buying: " + name);
}
  function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-GB";
  speech.rate = 0.95;
  speech.pitch = 0.9;
  window.speechSynthesis.speak(speech);
  }
</script>

</body>
</html>
