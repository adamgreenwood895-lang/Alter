<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTER</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  padding: 20px;
}

.title {
  font-size: 22px;
  margin-bottom: 20px;
  opacity: 0.8;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.card {
  background: #111;
  border-radius: 16px;
  overflow: hidden;
  transition: 0.2s;
}

.card:active {
  transform: scale(0.97);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.info {
  padding: 10px;
}

.name {
  font-size: 14px;
}

.price {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 4px;
}

.buy {
  margin-top: 8px;
  padding: 8px;
  width: 100%;
  border: none;
  background: white;
  color: black;
  border-radius: 8px;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container">
  <div class="title" id="title"></div>
  <div class="grid" id="grid"></div>
</div>

<script src="products.js"></script>

<script>
// GET CATEGORY FROM URL
const params = new URLSearchParams(window.location.search);
const type = params.get("type") || "hoodies";

document.getElementById("title").innerText = type;

// 🔊 VOICE FEEDBACK
setTimeout(() => {
  speak("Showing " + type);
}, 500);

// LOAD PRODUCTS
const items = PRODUCTS[type];
const grid = document.getElementById("grid");

items.forEach(product => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${product.image}">
    <div class="info">
      <div class="name">${product.name}</div>
      <div class="price">${product.price}</div>
      <button class="buy">Buy</button>
    </div>
  `;

  grid.appendChild(card);
});

// 🔊 AI VOICE
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-GB";
  speech.rate = 0.95;
  speech.pitch = 0.9;
  window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
