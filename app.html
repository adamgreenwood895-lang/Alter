<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALTER</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .voice-ui {
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    .text {
      opacity: 0.6;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .mic {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: white;

      display: flex;
      justify-content: center;
      align-items: center;

      position: relative;

      box-shadow:
        0 0 20px rgba(255,255,255,0.2),
        0 0 60px rgba(255,255,255,0.1);

      animation: breathe 2.5s infinite ease-in-out;
      cursor: pointer;
    }

    .mic.active {
      box-shadow:
        0 0 40px rgba(255,255,255,0.5),
        0 0 100px rgba(255,255,255,0.3);
    }

    .mic::after {
      content: "";
      width: 30px;
      height: 30px;
      background: black;
      border-radius: 50%;
    }

    .mic::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      animation: ripple 2.5s infinite;
    }

    @keyframes breathe {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }
      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="voice-ui">
    <div class="text" id="status">Tap to speak</div>
    <div class="mic" id="mic"></div>
  </div>

  <script>
    const mic = document.getElementById("mic");
    const status = document.getElementById("status");

    let recognition;

    // 🎤 INIT VOICE
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.lang = "en-GB";
      recognition.interimResults = false;
    }

    // 🔊 SPEAK FUNCTION
    function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-GB";
  speech.rate = 0.92;
  speech.pitch = 0.85;
  speech.volume = 1;
  window.speechSynthesis.cancel(); // stops overlap
  window.speechSynthesis.speak(speech);
    }

    // 🎯 MIC CLICK
    mic.addEventListener("click", () => {
      if (!recognition) {
        status.innerText = "Voice not supported";
        return;
      }

      mic.classList.add("active");
      status.innerText = "Listening...";
      recognition.start();
    });

    // 🧠 VOICE RESULT
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript.toLowerCase();

      status.innerText = transcript;
      mic.classList.remove("active");

      setTimeout(() => {

        if (transcript.includes("hoodie")) {
          speak("Showing hoodies");
          window.location.href = "categories.html?type=hoodies";
        }

        else if (transcript.includes("t shirt") || transcript.includes("tshirt")) {
          speak("Showing t shirts");
          window.location.href = "categories.html?type=tshirts";
        }

        else if (transcript.includes("tracksuit")) {
          speak("Showing tracksuits");
          window.location.href = "categories.html?type=tracksuits";
        }

        else if (transcript.includes("bag") || transcript.includes("handbag")) {
          speak("Showing bags");
          window.location.href = "categories.html?type=bags";
        }

        else {
          status.innerText = "Refining search...";
          speak("Refining your search");
        }

      }, 1000);
    };
  </script>

</body>
</html>
