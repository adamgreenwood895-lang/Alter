<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALTER</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: -apple-system, sans-serif;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;

      background: url("./assets/orb-clean.png") no-repeat center center;
background-size: cover;

      transition: opacity 0.3s ease;
    }

    .voice-ui {
      text-align: center;
      animation: fadeIn 1.2s ease;
    }
  .status {
  .status {
  position: absolute;
  bottom: 28%;
  width: 100%;
  text-align: center;
  font-size: 16px;
  opacity: 0.85;
  letter-spacing: 2px;
  }
    }/* ORB HITBOX */
.orb-hitbox {
  position: absolute;
  bottom: 9%;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 180px;
  border-radius: 50%;
  cursor: pointer;
}

/* CLEAN GLOW (no black circle) */
.orb-hitbox::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: transparent;
  box-shadow: 0 0 50px rgba(255,255,255,0.25);
  transition: all 0.3s ease;
}

/* LISTENING */
.orb-hitbox.active::after {
  box-shadow: 0 0 120px rgba(255,255,255,0.9);
  transform: scale(1.15);
}

  </style>
</head>

<body>

  <div class="voice-ui">
  <div class="orb-hitbox" id="mic"></div>
<div class="status" id="status">Tap to speak</div>
  </div>

  <script>
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.getVoices();
    };

    const mic = document.querySelector(".orb-hitbox");
    const status = document.getElementById("status");

    let recognition;

    // 🎤 INIT VOICE
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.lang = "en-GB";
      recognition.interimResults = false;
    }

    // 🔊 SPEAK FUNCTION
    function speak(text) {
      const speech = new SpeechSynthesisUtterance(text);
      const voices = window.speechSynthesis.getVoices();

      const preferred =
        voices.find(v => v.name.includes("Google UK English Female")) ||
        voices.find(v => v.name.includes("Google UK English Male")) ||
        voices.find(v => v.lang === "en-GB");

      if (preferred) speech.voice = preferred;

      speech.rate = 0.92;
      speech.pitch = 0.9;
      speech.volume = 1;

      window.speechSynthesis.speak(speech);
    }

    // 🎯 MIC CLICK
    let isListening = false;

mic.addEventListener("click", () => {
  if (!recognition) return;

  if (!isListening) {
    recognition.start();
    isListening = true;

    status.innerText = "Listening...";
    mic.classList.add("active");
  }
});

recognition.onend = () => {
  isListening = false;

  mic.classList.remove("active");

  // CLEAN UX (no annoying reset text)
  status.innerText = "";
};
    // 🧠 VOICE RESULT
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript.toLowerCase();

      status.innerText = transcript;
      mic.classList.remove("active");

      setTimeout(() => {

        // 🔥 HOODIES
        if (transcript.includes("hood")) {
          speak("I've found a selection of hoodies for you");
          localStorage.setItem("category", "hoodies");

          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "categories.html";
          }, 300);
        }

        // 🔥 TSHIRTS
        else if (
          transcript.includes("shirt") ||
          transcript.includes("tshirt") ||
          transcript.includes("tee")
        ) {
          speak("I've found a selection of t shirts for you");
          localStorage.setItem("category", "tshirts");

          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "categories.html";
          }, 300);
        }

        // 🔥 TRACKSUITS
        else if (transcript.includes("track")) {
          speak("I've found a selection of tracksuits for you");
          localStorage.setItem("category", "tracksuits");

          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "categories.html";
          }, 300);
        }

        // 🔥 BAGS
        else if (transcript.includes("bag")) {
          speak("I've found a selection of bags for you");
          localStorage.setItem("category", "bags");

          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "categories.html";
          }, 300);
        }

        // ❌ NO MATCH
        else {
          status.innerText = "Try hoodie, t shirt, or tracksuit";
          speak("Try saying hoodie or t shirt");
        }

      }, 500);
    };
  </script>

</body>
</html>
