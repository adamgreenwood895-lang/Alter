<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALTER</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: -apple-system, sans-serif;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;

      background: url("assets/bg.png") no-repeat center center fixed;
      background-size: cover;

      transition: opacity 0.3s ease;
    }

    /* overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .voice-ui {
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    .status {
      opacity: 0.7;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }
.orb-hitbox {
  position: absolute;

  width: 160px;
  height: 160px;

  border-radius: 50%;

  left: 50%;
  top: 75%; /* adjust this */

  transform: translate(-50%, -50%);
  cursor: pointer;
    }
    .orb-hitbox.active {
  background: transparent;
  box-shadow: none;
}

/* GLOW LAYER (this sits on top of the real orb) */
.orb-hitbox::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  transition: all 0.3s ease;
}

/* ACTIVE GLOW (when listening) */
.orb-hitbox.active::after {
  box-shadow:
    0 0 60px rgba(255,255,255,0.7),
    0 0 140px rgba(255,255,255,0.4);

  animation: pulseGlow 1.5s infinite;
}

/* PULSE ANIMATION */
@keyframes pulseGlow {
  0% {
    box-shadow:
      0 0 40px rgba(255,255,255,0.5),
      0 0 100px rgba(255,255,255,0.3);
  }

  50% {
    box-shadow:
      0 0 100px rgba(255,255,255,0.9),
      0 0 180px rgba(255,255,255,0.5);
  }

  100% {
    box-shadow:
      0 0 40px rgba(255,255,255,0.5),
      0 0 100px rgba(255,255,255,0.3);
  }
}

/* TAP FEEDBACK */
.orb-hitbox:active {
  transform: translate(-50%, -50%) scale(0.95);
}
    }
  </style>
</head>

<body>

  <div class="voice-ui">
  <div class="orb-hitbox" id="mic"></div>
<div class="status" id="status">Tap to speak</div>
  </div>

  <script>
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.getVoices();
    };

    const mic = document.getElementById("mic");
    const status = document.getElementById("status");

    let recognition;

    // 🎤 INIT VOICE
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.lang = "en-GB";
      recognition.interimResults = false;
    }

    // 🔊 SPEAK FUNCTION
    function speak(text) {
      const speech = new SpeechSynthesisUtterance(text);
      const voices = window.speechSynthesis.getVoices();

      const preferred =
        voices.find(v => v.name.includes("Google UK English Female")) ||
        voices.find(v => v.name.includes("Google UK English Male")) ||
        voices.find(v => v.lang === "en-GB");

      if (preferred) speech.voice = preferred;

      speech.rate = 0.92;
      speech.pitch = 0.9;
      speech.volume = 1;

      window.speechSynthesis.speak(speech);
    }

    // 🎯 MIC CLICK
    let isListening = false;

mic.addEventListener("click", () => {
  if (!recognition) return;

  if (!isListening) {
    recognition.start();
    isListening = true;

    status.innerText = "Listening...";
    mic.classList.add("active");
  }
});

    recognition.onend = () => {
      isListening = false;
      mic.classList.remove("active");
      mic.style.animation = "breathe 3s infinite";
    };

    // 🧠 VOICE RESULT
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript.toLowerCase();

      status.innerText = transcript;
      mic.classList.remove("active");

      setTimeout(() => {

        // 🔥 HOODIES
        if (transcript.includes("hood")) {
          speak("I've found a selection of hoodies for you");
          localStorage.setItem("category", "hoodies");

          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "categories.html";
          }, 300);
        }

        // 🔥 TSHIRTS
        else if (
          transcript.includes("shirt") ||
          transcript.includes("tshirt") ||
          transcript.includes("tee")
        ) {
          speak("I've found a selection of t shirts for you");
          localStorage.setItem("category", "tshirts");

          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "categories.html";
          }, 300);
        }

        // 🔥 TRACKSUITS
        else if (transcript.includes("track")) {
          speak("I've found a selection of tracksuits for you");
          localStorage.setItem("category", "tracksuits");

          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "categories.html";
          }, 300);
        }

        // 🔥 BAGS
        else if (transcript.includes("bag")) {
          speak("I've found a selection of bags for you");
          localStorage.setItem("category", "bags");

          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "categories.html";
          }, 300);
        }

        // ❌ NO MATCH
        else {
          status.innerText = "Try hoodie, t shirt, or tracksuit";
          speak("Try saying hoodie or t shirt");
        }

      }, 500);
    };
  </script>

</body>
</html>
