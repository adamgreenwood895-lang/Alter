<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALTER</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .voice-ui {
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    .text {
      opacity: 0.6;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    /* MIC BUTTON */
    .mic {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: white;

      display: flex;
      justify-content: center;
      align-items: center;

      position: relative;

      box-shadow:
        0 0 20px rgba(255,255,255,0.2),
        0 0 60px rgba(255,255,255,0.1);

      animation: breathe 2.5s infinite ease-in-out;
    }

    /* INNER DOT */
    .mic::after {
      content: "";
      width: 30px;
      height: 30px;
      background: black;
      border-radius: 50%;
    }

    /* GLOW RING */
    .mic::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;

      border: 1px solid rgba(255,255,255,0.2);

      animation: ripple 2.5s infinite;
    }

    /* ANIMATIONS */
    @keyframes breathe {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }
      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <div class="voice-ui">
    <div class="text">Say it</div>
    <div class="mic"></div>
  </div>

</body>
</html>
